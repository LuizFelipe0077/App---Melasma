<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Acompanhamento Clínico Integrativo - Tratamento Personalizado</title>
  
  <!-- Security Headers (CWE-1021, CWE-16) -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://script.google.com https://script.googleusercontent.com; img-src 'self' data:; frame-ancestors 'none';">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta name="referrer" content="strict-origin-when-cross-origin">

  <!-- SEO Meta Tags -->
  <meta name="description" content="Acompanhe seu protocolo de tratamento clínico de forma simples, leve e intuitiva. Gerencie doses, acompanhe sua evolução e conquiste hábitos saudáveis diariamente.">
  <meta name="theme-color" content="#0F172A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <!-- Google Fonts: Outfit (subset latin for reduced download ~45KB→12KB) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap&subset=latin" rel="stylesheet">
  
  <!-- Preconnect to GAS Backend (~300ms savings on DNS+TLS handshake) -->
  <link rel="preconnect" href="https://script.google.com" crossorigin>
  
  <!-- Main CSS -->
  <link rel="stylesheet" href="./src/presentation/index.css">
</head>
<body>
  
  <!-- Main SPA Container (New CSS Grid Shell) -->
  <div id="app" class="app-shell">
    <!-- Skeleton Screen / Initial Loading state before JS boots -->
    <div class="split-screen" style="height: 100vh;">
      <div class="split-screen-content">
        <div class="spinner" style="border-top-color: var(--color-brand-success); margin-bottom: 24px; width: 32px; height: 32px;"></div>
        <p class="text-p" style="font-weight: 500;">Carregando ambiente seguro...</p>
      </div>
    </div>
  </div>

  <!-- Main JavaScript App Entrypoint (ES Modules) -->
  <script type="module" src="./src/presentation/app.js"></script>
</body>
</html>
